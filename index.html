<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="index.css">
</head>

<body>

  <script src="https://unpkg.com/noisejs@2.1.0/index.js"></script>


<div id="controls" class="creature-controls">
  <div class="stats-card">
    <h2>Herbivores</h2>

    <div class="input-grid">
      <label>
        <span>Count:</span>
        <input id="herbivore-count" type="number" value="50">
      </label>

      <label>
        <span>Food:</span>
        <input id="herbivore-food" type="number" value="100">
      </label>

      <label>
        <span>Water:</span>
        <input id="herbivore-water" type="number" value="100">
      </label>

      <label>
        <span>Sight (tiles):</span>
        <input id="herbivore-sight" type="number" value="5">
      </label>

      <label>
        <span>Speed:</span>
        <input id="herbivore-speed" type="number" step="0.1" value="1">
      </label>

      <label>
        <span>Size:</span>
        <input id="herbivore-size" type="number" step="0.1" value="0.5">
      </label>

      <label>
        <span>Breed Time (ms):</span>
        <input id="herbivore-breed-time" type="number" value="8000">
      </label>

      <label>
        <span>water decay rate:</span>
        <input id="water-Decay-Rate" type="number" value="3">
      </label>


      <label>
        <span>food decay rate:</span>
        <input id="food-Decay-Rate" type="number" value="1">
      </label>
    </div>
  </div>

  <div class="stats-card">
    <h2>Carnivores</h2>

    <div class="input-grid">
      <label>
        <span>Count:</span>
        <input id="carnivore-count" type="number" value="50">
      </label>

      <label>
        <span>Food:</span>
        <input id="carnivore-food" type="number" value="100">
      </label>

      <label>
        <span>Water:</span>
        <input id="carnivore-water" type="number" value="100">
      </label>

      <label>
        <span>Sight (tiles):</span>
        <input id="carnivore-sight" type="number" value="5">
      </label>

      <label>
        <span>Speed:</span>
        <input id="carnivore-speed" type="number" step="0.1" value="1">
      </label>

      <label>
        <span>Size:</span>
        <input id="carnivore-size" type="number" step="0.1" value="0.5">
      </label>

      <label>
        <span>Breed Time (ms):</span>
        <input id="carnivore-breed-time" type="number" value="15000">
      </label>

      <label>
        <span>water decay rate:</span>
        <input id="water-Decay-Rate" type="number" value="3">
      </label>


      <label>
        <span>food decay rate:</span>
        <input id="food-Decay-Rate" type="number" value="1">
      </label>
    </div>
  </div>

  <button id="spawn-btn" class="spawn-btn">Apply / Spawn</button>
</div>





<div id="game">
  <canvas id="terrain"></canvas>
  <canvas id="entities"></canvas>
</div>


  <script type="module" src="index.js"></script>
</body>
</html>
